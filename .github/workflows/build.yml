# =============================================================================
# Conch — CI / Release pipeline
#
# Every push to main builds all platform variants in parallel and publishes
# a GitHub Release with every installer attached.
#
# Artifacts produced (version read from pom.xml):
#   Conch-X.Y.Z-arm64.dmg              macOS Apple Silicon
#   conch_X.Y.Z_arm64.deb              Linux Debian/Ubuntu  arm64
#   conch_X.Y.Z_amd64.deb              Linux Debian/Ubuntu  x86_64
#   conch-X.Y.Z-1.aarch64.rpm          Linux Fedora/RHEL    arm64
#   conch-X.Y.Z-1.x86_64.rpm           Linux Fedora/RHEL    x86_64
#   Conch-X.Y.Z.msi                    Windows x86_64
#
# macOS runners:   macos-latest (arm64 only — GitHub retired macos-13 Intel)
#                  For an Intel x86_64 .dmg, add a self-hosted Intel runner.
# Linux runners:   ubuntu-latest (x86_64) + ubuntu-24.04-arm (arm64)
# Windows runner:  windows-latest (x86_64)
#
# jpackage bundles the host JRE; cross-compilation is not possible.
# =============================================================================

name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Extract version from pom.xml ───────────────────────────────────────────
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Read version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ── macOS .app + .dmg (arm64) ──────────────────────────────────────────────
  # GitHub retired the macos-13 Intel runner in 2025, so only arm64 is
  # available as a GitHub-hosted runner.  For x86_64, add a self-hosted
  # Intel Mac runner and uncomment the matrix entry below.
  build-mac:
    name: macOS (arm64)
    runs-on: macos-latest
    needs: [version]
    env:
      APP_VERSION: ${{ needs.version.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      - name: Generate macOS icon (.icns)
        run: make icons-mac

      - name: Package .app
        run: make APP_VERSION=$APP_VERSION app-mac

      - name: Package .dmg
        run: make APP_VERSION=$APP_VERSION dmg

      - name: Add architecture suffix to .dmg
        run: |
          for f in dist/mac/*.dmg; do
            mv "$f" "${f%.dmg}-arm64.dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/mac/*.dmg
          retention-days: 30

  # ── Linux .deb + .rpm (arm64 and x86_64) ──────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [version]
    env:
      APP_VERSION: ${{ needs.version.outputs.app_version }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest      # x86_64
            arch:   x86_64
          - runner: ubuntu-24.04-arm   # arm64
            arch:   arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      # fakeroot is pre-installed; rpm provides rpmbuild for RPM packaging.
      - name: Install RPM build tools
        run: sudo apt-get install -y rpm

      - name: Stage JAR
        run: |
          mkdir -p target/package-input
          JAR=$(ls target/conch-*.jar | head -1 | xargs basename)
          cp target/$JAR target/package-input/
          echo "MAIN_JAR=$JAR" >> $GITHUB_ENV

      # deb/rpm filenames already embed the architecture (amd64, arm64,
      # x86_64, aarch64) so no renaming is needed.
      - name: Package .deb
        run: |
          $JAVA_HOME/bin/jpackage \
            --input        target/package-input \
            --main-jar     $MAIN_JAR \
            --main-class   com.github.an0nn30.conch.Main \
            --name         conch \
            --app-version  $APP_VERSION \
            --vendor       Conch \
            --description  "A cross-platform SSH client" \
            --icon         src/main/package/conch.png \
            --java-options "-Xmx512m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --type         deb \
            --dest         dist/linux

      - name: Package .rpm
        run: |
          $JAVA_HOME/bin/jpackage \
            --input        target/package-input \
            --main-jar     $MAIN_JAR \
            --main-class   com.github.an0nn30.conch.Main \
            --name         conch \
            --app-version  $APP_VERSION \
            --vendor       Conch \
            --description  "A cross-platform SSH client" \
            --icon         src/main/package/conch.png \
            --java-options "-Xmx512m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --type         rpm \
            --dest         dist/linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist-${{ matrix.arch }}
          path: dist/linux/
          retention-days: 30

  # ── Windows .msi (x86_64) ─────────────────────────────────────────────────
  build-win:
    name: Windows
    runs-on: windows-latest
    needs: [version]
    env:
      APP_VERSION: ${{ needs.version.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      - name: Stage JAR
        shell: bash
        run: |
          mkdir -p target/package-input
          JAR=$(ls target/conch-*.jar | head -1 | xargs basename)
          cp target/$JAR target/package-input/
          echo "MAIN_JAR=$JAR" >> $GITHUB_ENV

      # ImageMagick (magick) is pre-installed on windows-latest.
      - name: Generate Windows icon (.ico)
        shell: bash
        run: |
          magick src/main/package/conch.png \
            -define icon:auto-resize=256,128,64,48,32,16 \
            src/main/package/conch.ico

      # WiX Toolset 3.x is required by jpackage --type msi.
      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Package .msi
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\win | Out-Null
          & "$env:JAVA_HOME\bin\jpackage" `
            --input          "target\package-input"                      `
            --main-jar       "$env:MAIN_JAR"                             `
            --main-class     "com.github.an0nn30.conch.Main"             `
            --name           "Conch"                                     `
            --app-version    "$env:APP_VERSION"                          `
            --vendor         "Conch"                                     `
            --description    "A cross-platform SSH client"               `
            --java-options   "-Xmx512m"                                  `
            --java-options   "-Dfile.encoding=UTF-8"                     `
            --type           msi                                         `
            --dest           "dist\win"                                  `
            --icon           "src\main\package\conch.ico"                `
            --win-dir-chooser                                            `
            --win-menu                                                   `
            --win-shortcut

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/win/
          retention-days: 30

  # ── GitHub Release (every push to main) ───────────────────────────────────
  release:
    name: Release
    needs: [version, build-mac, build-linux, build-win]
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.app_version }}
    # always() lets this job evaluate its own condition even when a dependency
    # failed.  We then gate on: push event + Windows succeeded (minimum viable
    # release) + nothing was cancelled mid-run.
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.build-win.result == 'success' &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Download whatever artifacts were produced — steps are skipped if the
      # corresponding build job didn't succeed, so a partial build still
      # produces a release with whatever installers are available.
      - name: Download macOS artifacts
        if: needs.build-mac.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: dist/mac/

      - name: Download Linux artifacts
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: linux-dist-*
          merge-multiple: true
          path: dist/linux/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/win/

      # Collect whichever files were downloaded and attach them all.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=()
          for f in dist/mac/*.dmg dist/linux/*.deb dist/linux/*.rpm dist/win/*.msi; do
            [ -f "$f" ] && FILES+=("$f")
          done
          gh release create "v$APP_VERSION" \
            --title "Conch v$APP_VERSION" \
            --generate-notes \
            "${FILES[@]}"
