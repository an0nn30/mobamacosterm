# =============================================================================
# MobaMacOS Terminal — CI / Release pipeline
#
# Every push to main builds all platform variants in parallel and publishes
# a GitHub Release with every installer attached.
#
# Artifacts produced:
#   MobaMacOS Terminal-1.0.N-arm64.dmg      macOS Apple Silicon
#   MobaMacOS Terminal-1.0.N-x86_64.dmg     macOS Intel
#   mobamacos-terminal_1.0.N_arm64.deb      Linux Debian/Ubuntu  arm64
#   mobamacos-terminal_1.0.N_amd64.deb      Linux Debian/Ubuntu  x86_64
#   mobamacos-terminal-1.0.N-1.aarch64.rpm  Linux Fedora/RHEL    arm64
#   mobamacos-terminal-1.0.N-1.x86_64.rpm   Linux Fedora/RHEL    x86_64
#   MobaMacOS Terminal-1.0.N.msi            Windows x86_64
#
# macOS runners:   macos-latest (arm64) + macos-13 (x86_64)  — 10x Linux rate
# Linux runners:   ubuntu-latest (x86_64) + ubuntu-24.04-arm (arm64)
# Windows runner:  windows-latest (x86_64)                   — 2x Linux rate
#
# jpackage bundles the host JRE, so cross-compilation is not possible;
# each platform/arch must be built on a matching runner.
# =============================================================================

name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  APP_VERSION: 1.0.${{ github.run_number }}

jobs:

  # ── macOS .app + .dmg (arm64 and x86_64) ──────────────────────────────────
  build-mac:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest   # arm64 — Apple Silicon
            arch:   arm64
          - runner: macos-13       # x86_64 — Intel
            arch:   x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      - name: Generate macOS icon (.icns)
        run: make icons-mac

      - name: Package .app
        run: make APP_VERSION=$APP_VERSION app-mac

      - name: Package .dmg
        run: make APP_VERSION=$APP_VERSION dmg

      # jpackage names all macOS DMGs identically regardless of arch, so we
      # add the arch suffix here before uploading.
      - name: Add architecture suffix to .dmg
        run: |
          for f in dist/mac/*.dmg; do
            mv "$f" "${f%.dmg}-${{ matrix.arch }}.dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dist-${{ matrix.arch }}
          path: dist/mac/*.dmg
          retention-days: 30

  # ── Linux .deb + .rpm (arm64 and x86_64) ──────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest      # x86_64
            arch:   x86_64
          - runner: ubuntu-24.04-arm   # arm64
            arch:   arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      # fakeroot is pre-installed; rpm provides rpmbuild for RPM packaging.
      - name: Install RPM build tools
        run: sudo apt-get install -y rpm

      # Stage the JAR manually to avoid re-invoking Maven via the Makefile's
      # PHONY dependency chain.
      - name: Stage JAR
        run: |
          mkdir -p target/package-input
          cp target/mobamacos-terminal-0.1.0-SNAPSHOT.jar target/package-input/

      # deb/rpm filenames already embed the architecture (amd64, arm64,
      # x86_64, aarch64) so no renaming is needed.
      - name: Package .deb
        run: |
          $JAVA_HOME/bin/jpackage \
            --input        target/package-input \
            --main-jar     mobamacos-terminal-0.1.0-SNAPSHOT.jar \
            --main-class   com.mobamacos.Main \
            --name         mobamacos-terminal \
            --app-version  $APP_VERSION \
            --vendor       MobaMacOS \
            --description  "A MobaXterm-inspired SSH client for macOS" \
            --icon         src/main/package/app-icon-512.png \
            --java-options "-Xmx512m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --type         deb \
            --dest         dist/linux

      - name: Package .rpm
        run: |
          $JAVA_HOME/bin/jpackage \
            --input        target/package-input \
            --main-jar     mobamacos-terminal-0.1.0-SNAPSHOT.jar \
            --main-class   com.mobamacos.Main \
            --name         mobamacos-terminal \
            --app-version  $APP_VERSION \
            --vendor       MobaMacOS \
            --description  "A MobaXterm-inspired SSH client for macOS" \
            --icon         src/main/package/app-icon-512.png \
            --java-options "-Xmx512m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --type         rpm \
            --dest         dist/linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist-${{ matrix.arch }}
          path: dist/linux/
          retention-days: 30

  # ── Windows .exe (x86_64) ─────────────────────────────────────────────────
  build-win:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      - name: Stage JAR
        shell: bash
        run: |
          mkdir -p target/package-input
          cp target/mobamacos-terminal-0.1.0-SNAPSHOT.jar target/package-input/

      # ImageMagick (magick) is pre-installed on windows-latest.
      - name: Generate Windows icon (.ico)
        shell: bash
        run: |
          magick src/main/package/app-icon-512.png \
            -define icon:auto-resize=256,128,64,48,32,16 \
            src/main/package/mobamacos-terminal.ico

      # WiX Toolset 3.x is required by jpackage --type msi.
      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      # MSI is the native Windows Installer format — integrates with Add/Remove
      # Programs, Group Policy, and enterprise deployment tools.
      # Note: --win-shortcut-prompt is EXE-only and is not valid for MSI.
      - name: Package .msi
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\win | Out-Null
          & "$env:JAVA_HOME\bin\jpackage" `
            --input          "target\package-input"                      `
            --main-jar       "mobamacos-terminal-0.1.0-SNAPSHOT.jar"     `
            --main-class     "com.mobamacos.Main"                        `
            --name           "MobaMacOS Terminal"                        `
            --app-version    "$env:APP_VERSION"                          `
            --vendor         "MobaMacOS"                                 `
            --description    "A MobaXterm-inspired SSH client for macOS" `
            --java-options   "-Xmx512m"                                  `
            --java-options   "-Dfile.encoding=UTF-8"                     `
            --type           msi                                         `
            --dest           "dist\win"                                  `
            --icon           "src\main\package\mobamacos-terminal.ico"   `
            --win-dir-chooser                                            `
            --win-menu                                                   `
            --win-shortcut

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/win/
          retention-days: 30

  # ── GitHub Release (every push to main) ───────────────────────────────────
  release:
    name: Release
    needs: [build-mac, build-linux, build-win]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: macos-dist-*
          merge-multiple: true
          path: dist/mac/

      - uses: actions/download-artifact@v4
        with:
          pattern: linux-dist-*
          merge-multiple: true
          path: dist/linux/

      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/win/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$APP_VERSION" \
            --title "MobaMacOS Terminal v$APP_VERSION" \
            --generate-notes \
            dist/mac/*.dmg \
            dist/linux/*.deb \
            dist/linux/*.rpm \
            dist/win/*.msi
